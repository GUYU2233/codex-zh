name: remote-build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Cargo profile
        required: true
        default: release
        type: choice
        options:
          - release
          - dev-small

concurrency:
  group: remote-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Linux artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: write
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_INCREMENTAL: "0"
      RUST_MIN_STACK: "8388608"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            pkg-config \
            libcap-dev \
            util-linux

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0

      - name: Build artifacts
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.profile }}" == "release" ]]; then
            profile_args=(--release)
            artifact_dir="target/release"
          else
            profile_args=(--profile dev-small)
            artifact_dir="target/dev-small"
          fi

          cargo build "${profile_args[@]}" --bin codex --bin codex-responses-api-proxy

          mkdir -p dist
          cp "${artifact_dir}/codex" "dist/codex-linux-x86_64"
          cp "${artifact_dir}/codex-responses-api-proxy" "dist/codex-responses-api-proxy-linux-x86_64"
          tar -C dist -czf "dist/codex-linux-x86_64.tar.gz" codex-linux-x86_64
          tar -C dist -czf "dist/codex-responses-api-proxy-linux-x86_64.tar.gz" codex-responses-api-proxy-linux-x86_64

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: remote-build-linux-${{ inputs.profile }}
          path: |
            codex-rs/dist/codex-linux-x86_64
            codex-rs/dist/codex-linux-x86_64.tar.gz
            codex-rs/dist/codex-responses-api-proxy-linux-x86_64
            codex-rs/dist/codex-responses-api-proxy-linux-x86_64.tar.gz

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="remote-build-latest"
          title="Remote Build Latest"
          notes_file="${RUNNER_TEMP}/remote-build-release-notes.md"

          cat > "$notes_file" <<EOF
          Automated remote build artifacts.

          Commit: ${{ github.sha }}
          Profile: ${{ inputs.profile }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --repo "${{ github.repository }}" \
              --title "$title" \
              --notes-file "$notes_file"
          else
            gh release create "$tag" \
              --repo "${{ github.repository }}" \
              --title "$title" \
              --notes-file "$notes_file"
          fi

          gh release upload "$tag" \
            --repo "${{ github.repository }}" \
            --clobber \
            dist/codex-linux-x86_64 \
            dist/codex-linux-x86_64.tar.gz \
            dist/codex-responses-api-proxy-linux-x86_64 \
            dist/codex-responses-api-proxy-linux-x86_64.tar.gz
