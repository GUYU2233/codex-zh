name: remote-build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Cargo profile
        required: true
        default: release
        type: choice
        options:
          - release
          - dev-small

concurrency:
  group: remote-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Linux artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: write
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_INCREMENTAL: "0"
      RUST_MIN_STACK: "8388608"
      TARGET: x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            pkg-config \
            libcap-dev \
            util-linux \
            libubsan1

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ env.TARGET }}

      - name: Use hermetic Cargo home
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.14.0

      - name: Install musl build tools
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - name: Configure rustc UBSan wrapper
        shell: bash
        run: |
          set -euo pipefail
          ubsan=""
          if command -v ldconfig >/dev/null 2>&1; then
            ubsan="$(ldconfig -p | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/')"
          fi
          wrapper_root="${RUNNER_TEMP:-/tmp}"
          wrapper="${wrapper_root}/rustc-ubsan-wrapper"
          cat > "${wrapper}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -n "${ubsan}" ]]; then
            export LD_PRELOAD="${ubsan}\${LD_PRELOAD:+:\${LD_PRELOAD}}"
          fi
          exec "\$1" "\${@:2}"
          EOF
          chmod +x "${wrapper}"
          echo "RUSTC_WRAPPER=${wrapper}" >> "$GITHUB_ENV"
          echo "RUSTC_WORKSPACE_WRAPPER=" >> "$GITHUB_ENV"

      - name: Clear sanitizer flags
        shell: bash
        run: |
          set -euo pipefail
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY_X86_64_UNKNOWN_LINUX_MUSL=1" >> "$GITHUB_ENV"

          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_ENCODED_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"

          sanitize_flags() {
            local input="$1"
            input="${input//-fsanitize=undefined/}"
            input="${input//-fno-sanitize-recover=undefined/}"
            input="${input//-fno-sanitize-trap=undefined/}"
            echo "$input"
          }

          cflags="$(sanitize_flags "${CFLAGS-}")"
          cxxflags="$(sanitize_flags "${CXXFLAGS-}")"
          echo "CFLAGS=${cflags}" >> "$GITHUB_ENV"
          echo "CXXFLAGS=${cxxflags}" >> "$GITHUB_ENV"

      - name: Configure musl rusty_v8 artifact overrides and verify checksums
        uses: ./.github/actions/setup-rusty-v8-musl
        with:
          target: ${{ env.TARGET }}

      - name: Build artifacts
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.profile }}" == "release" ]]; then
            profile_args=(--release)
          else
            profile_args=(--profile dev-small)
          fi

          artifact_dir="target/${TARGET}"
          if [[ "${{ inputs.profile }}" == "release" ]]; then
            artifact_dir="${artifact_dir}/release"
          else
            artifact_dir="${artifact_dir}/dev-small"
          fi

          cargo build --target "${TARGET}" "${profile_args[@]}" --bin codex --bin codex-responses-api-proxy

          mkdir -p dist
          cp "${artifact_dir}/codex" "dist/codex-linux-x86_64"
          cp "${artifact_dir}/codex-responses-api-proxy" "dist/codex-responses-api-proxy-linux-x86_64"
          tar -C dist -czf "dist/codex-linux-x86_64.tar.gz" codex-linux-x86_64
          tar -C dist -czf "dist/codex-responses-api-proxy-linux-x86_64.tar.gz" codex-responses-api-proxy-linux-x86_64

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: remote-build-linux-${{ inputs.profile }}
          path: |
            codex-rs/dist/codex-linux-x86_64
            codex-rs/dist/codex-linux-x86_64.tar.gz
            codex-rs/dist/codex-responses-api-proxy-linux-x86_64
            codex-rs/dist/codex-responses-api-proxy-linux-x86_64.tar.gz

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="remote-build-latest"
          title="Remote Build Latest"
          notes_file="${RUNNER_TEMP}/remote-build-release-notes.md"

          cat > "$notes_file" <<EOF
          Automated remote build artifacts.

          Linux assets are built for ${TARGET} so they remain runnable on older glibc hosts.

          Commit: ${{ github.sha }}
          Profile: ${{ inputs.profile }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --repo "${{ github.repository }}" \
              --title "$title" \
              --notes-file "$notes_file"
          else
            gh release create "$tag" \
              --repo "${{ github.repository }}" \
              --title "$title" \
              --notes-file "$notes_file"
          fi

          gh release upload "$tag" \
            --repo "${{ github.repository }}" \
            --clobber \
            dist/codex-linux-x86_64 \
            dist/codex-linux-x86_64.tar.gz \
            dist/codex-responses-api-proxy-linux-x86_64 \
            dist/codex-responses-api-proxy-linux-x86_64.tar.gz
